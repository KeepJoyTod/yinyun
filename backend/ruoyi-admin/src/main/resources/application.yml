# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  # undertow 配置
  undertow:
    # HTTP post内容的最大大小。当值为-1时，默认值为大小是无限的
    max-http-post-size: 1GB
    # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    # 每块buffer的空间大小,越小的空间被利用越充分
    buffer-size: 512
    # 是否分配的直接内存
    direct-buffers: true
    threads:
      # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      io: 8
      # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
      worker: 256

captcha:
  # 是否启用验证码校验
  enable: true
  # 验证码类型 math 数组计算 char 字符验证
  type: math
  # 数字验证码位数
  numberLength: 1
  # 字符验证码长度
  charLength: 4

# 日志配置
logging:
  level:
    org.dromara: @logging.level@
    org.springframework: warn
    org.mybatis.spring.mapper: error
    org.apache.fury: warn
  config: classpath:logback-plus.xml

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  application:
    name: YingYueCloud
  threads:
    # 开启虚拟线程 仅jdk21可用
    virtual:
      enabled: false
  task:
    execution:
      # 从 springboot 3.5 开始 spring自带线程池
      # 不再需要 AsyncConfig与ThreadPoolConfig 可直接注入线程池使用
      thread-name-prefix: async-
      # 由spring自己初始化线程池
      mode: force
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: @profiles.active@
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mvc:
    # 设置静态资源路径 防止所有请求都去查静态资源
    static-path-pattern: /static/**
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  jackson:
    # 日期格式化
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      # 格式化输出
      indent_output: false
      # 忽略无法转换的对象
      fail_on_empty_beans: false
    deserialization:
      # 允许对象忽略json中不存在的属性
      fail_on_unknown_properties: false

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # jwt秘钥
  jwt-secret-key: abcdefghijklmnopqrstuvwxyz

# security配置
security:
  # 排除路径
  excludes:
    - /*.html
    - /**/*.html
    - /**/*.css
    - /**/*.js
    - /favicon.ico
    - /error
    - /*/api-docs
    - /*/api-docs/**
    - /warm-flow-ui/config

# 多租户配置
tenant:
  # 是否开启
  enable: true
  # 排除表
  excludes:
    - sys_menu
    - sys_tenant
    - sys_tenant_package
    - sys_role_dept
    - sys_role_menu
    - sys_user_post
    - sys_user_role
    - sys_client
    - sys_oss_config
    - flow_spel

# MyBatisPlus配置
# https://baomidou.com/config/
mybatis-plus:
  # 自定义配置 是否全局开启逻辑删除 关闭后 所有逻辑删除功能将失效
  enableLogicDelete: true
  # 多包名使用 例如 org.dromara.**.mapper,org.xxx.**.mapper
  mapperPackage: org.dromara.**.mapper
  # 对应的 XML 文件位置
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: org.dromara.**.domain
  global-config:
    dbConfig:
      # 主键类型
      # AUTO 自增 NONE 空 INPUT 用户输入 ASSIGN_ID 雪花 ASSIGN_UUID 唯一 UUID
      # 如需改为自增 需要将数据库表全部设置为自增
      idType: ASSIGN_ID

# 数据加密
mybatis-encryptor:
  # 是否开启加密
  enable: true
  # 默认加密算法
  algorithm: AES
  # 编码方式 BASE64/HEX。默认BASE64
  encode: BASE64
  # 安全秘钥 对称算法的秘钥 如：AES，SM4
  password: ${MYBATIS_ENCRYPTOR_PASSWORD:change-16-bytes!}
  # 公私钥 非对称算法的公私钥 如：SM2，RSA
  publicKey:
  privateKey:

# api接口加密
api-decrypt:
  # 是否开启全局接口加密
  enabled: ${API_DECRYPT_ENABLED:false}
  # AES 加密头标识
  headerFlag: encrypt-key
  # 响应加密公钥。真实密钥必须通过环境变量注入，禁止提交到 GitHub。
  publicKey: ${API_DECRYPT_PUBLIC_KEY:replace-with-response-encryption-public-key}
  # 请求解密私钥。真实密钥必须通过环境变量注入，禁止提交到 GitHub。
  privateKey: ${API_DECRYPT_PRIVATE_KEY:replace-with-request-decryption-private-key}

# 影约云业务配置
yy:
  client-booking:
    # 客户电脑网页预约意向默认归属租户；生产需按实际租户调整。
    default-tenant-id: ${YY_CLIENT_BOOKING_DEFAULT_TENANT_ID:000000}
    # 客户电脑网页预约意向默认归属门店；生产可按实际门店调整。
    default-store-id: ${YY_CLIENT_BOOKING_DEFAULT_STORE_ID:900001}
  client-photo:
    # 客户取片 token 签名密钥；生产必须通过环境变量覆盖，不能使用默认开发值。
    token-secret: ${YY_CLIENT_PHOTO_TOKEN_SECRET:yingyue-client-photo-dev-secret-change-me}
    phone-auth:
      # 默认关闭，微信/抖音真机域名和平台能力配置完成后再开启。
      enabled: ${YY_CLIENT_PHOTO_PHONE_AUTH_ENABLED:false}
      # 测试时可覆盖到 mock server；生产保持空值走平台官方地址。
      base-url: ${YY_CLIENT_PHOTO_PHONE_AUTH_BASE_URL:}
      # 微信手机号授权：优先使用静态 access_token；为空时用 AppID/AppSecret 自动获取并缓存 access_token。
      wechat-access-token: ${WECHAT_MINI_APP_ACCESS_TOKEN:}
      wechat-app-id: ${WECHAT_MINI_APP_ID:}
      wechat-app-secret: ${WECHAT_MINI_APP_SECRET:}
      # 抖音手机号授权：接口 path/token 需按最终官方能力确认后配置。
      douyin-access-token: ${DOUYIN_MINI_APP_ACCESS_TOKEN:}
      douyin-phone-path: ${DOUYIN_MINI_APP_PHONE_PATH:}
  client-order:
    # 客户订单详情链接的公网基础地址；通常是客户网页域名。
    public-base-url: ${YY_CLIENT_ORDER_PUBLIC_BASE_URL:https://photo.evanshine.me}
    # 客户订单 token 签名密钥；生产必须通过环境变量覆盖，不能使用默认开发值。
    token-secret: ${YY_CLIENT_ORDER_TOKEN_SECRET:yingyue-client-order-dev-secret-change-me}
  client-public:
    # 客户公开端会员 token 签名密钥；生产必须通过环境变量覆盖，不能使用默认开发值。
    token-secret: ${YY_CLIENT_PUBLIC_TOKEN_SECRET:yingyue-customer-dev-secret-change-me}

springdoc:
  api-docs:
    # 是否开启接口文档
    enabled: true
  info:
    # 标题
    title: '标题：影约云企业相馆管理系统_接口文档'
    # 描述
    description: '描述：用于管理连锁相馆预约、门店、订单、选片、渠道插件和微信生态接入。'
    # 版本
    version: '版本号: ${project.version}'
    # 作者信息
    contact:
      name: 影约云
      email: support@yingyue.local
      url: https://github.com
  #这里定义了两个分组，可定义多个，也可以不定义
  group-configs:
    - group: 1.演示模块
      packages-to-scan: org.dromara.demo
    - group: 2.通用模块
      packages-to-scan: org.dromara.web
    - group: 3.系统模块
      packages-to-scan: org.dromara.system
    - group: 4.代码生成模块
      packages-to-scan: org.dromara.generator
    - group: 5.工作流模块
      packages-to-scan: org.dromara.workflow

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接
  excludeUrls:
    - /system/notice

--- # 分布式锁 lock4j 全局配置
lock4j:
  # 获取分布式锁超时时间，默认为 3000 毫秒
  acquire-timeout: 3000
  # 分布式锁的超时时间，默认为 30 秒
  expire: 30000

--- # Actuator 监控端点的配置项
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
    logfile:
      external-file: ./logs/sys-console.log

--- # 默认/推荐使用sse推送
sse:
  enabled: true
  path: /resource/sse

--- # websocket
websocket:
  # 如果关闭 需要和前端开关一起关闭
  enabled: false
  # 路径
  path: /resource/websocket
  # 设置访问源地址
  allowedOrigins: '*'

--- # warm-flow工作流配置
warm-flow:
  # 是否开启工作流，默认true
  enabled: true
  # 是否开启设计器ui
  ui: true
  # 是否显示流程图顶部文字
  top-text-show: true
  # 是否渲染节点悬浮提示，默认true
  node-tooltip: true
  # 默认Authorization，如果有多个token，用逗号分隔
  token-name: ${sa-token.token-name},clientid
