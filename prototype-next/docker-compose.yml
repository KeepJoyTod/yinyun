services:
  postgres:
    image: postgres:16-alpine
    container_name: camera-studio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: camera_studio
      POSTGRES_USER: camera
      POSTGRES_PASSWORD: camera
    ports:
      - "5432:5432"
    volumes:
      - camera_studio_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camera -d camera_studio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  camera_studio_pg:
